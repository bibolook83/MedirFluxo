<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resultados da Detecção de Anomalias no Fluxo de Água</title>
    <style>
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        table, th, td {
            border: 1px solid black;
        }
        th, td {
            padding: 10px;
            text-align: left;
        }
        th {
            background-color: #f2f2f2;
        }
        /* Estilos para anomalias */
        .anomaly {
            background-color: #f8d7da; /* Vermelho claro */
            color: #721c24; /* Texto vermelho escuro */
        }
        /* Estilos para não anomalias */
        .no-anomaly {
            background-color: #d4edda; /* Verde claro */
            color: #155724; /* Texto verde escuro */
        }
        canvas {
            width: 100%;  /* Para responsividade */
            height: 250px; /* Ajuste a altura */
            margin: auto;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <h1>Resultados da Detecção de Anomalias no Fluxo de Água - Últimos 30 Dias</h1>
    
    <h2>Gráfico de Fluxo de Água</h2>
    <canvas id="flowChart"></canvas>

    <table>
        <thead>
            <tr>
                <th>Índice</th>
                <th>Data</th>
                <th>Fluxo de Água (L/min)</th>
                <th>Erro de Reconstrução (MSE)</th>
                <th>Anomalia</th>
            </tr>
        </thead>
        <tbody id="anomalyResults">
            <!-- Linhas serão preenchidas dinamicamente -->
        </tbody>
    </table>

    <script>
        // Dados fixos para os últimos 30 dias
        const labels = [
            "01/09", "02/09", "03/09", "04/09", "05/09",
            "06/09", "07/09", "08/09", "09/09", "10/09", "11/09",
            "12/09", "13/09", "14/09", "15/09", "16/09", "17/09",
            "18/09", "19/09", "20/09", "21/09", "22/09", "23/09",
            "24/09", "25/09", "26/09", "27/09", "28/09", "29/09",
            "30/09"
        ];

        const flowData = [
            12.69, 10.32, 18.28, 11.67, 10.38,
            11.24, 10.28, 14.95, 18.17, 11.48, 16.00,
            15.49, 17.23, 19.63, 44.69, 12.87, 16.35,
            16.59, 17.18, 10.92, 15.16, 10.11, 11.15,
            17.04, 17.46, 15.09, 13.88, 17.50, 15.46,
            19.27
        ];

        const mseValues = [
            2.31, 4.68, 3.28, 3.33, 4.62,
            3.76, 4.72, 0.05, 3.17, 3.52, 1.00,
            0.49, 2.23, 4.63, 29.69, 2.13, 1.35,
            1.59, 2.18, 4.08, 0.16, 4.89, 3.85,
            2.04, 2.46, 0.09, 1.12, 2.50, 0.46,
            4.27
        ];

        const anomalyResults = [
            'Não', 'Não', 'Não', 'Não', 'Não',
            'Não', 'Não', 'Não', 'Não', 'Não', 'Não',
            'Não', 'Não', 'Sim', 'Não', 'Não', 'Não',
            'Não', 'Não', 'Não', 'Não', 'Não', 'Não',
            'Não', 'Não', 'Não', 'Não', 'Não', 'Não',
            'Não', 'Não', 'Não', 'Não', 'Não', 'Não',
            'Não', 'Não', 'Não', 'Não', 'Não', 'Não',
            'Não', 'Não'
        ];

        // Preencher a tabela com os dados
        const tableBody = document.getElementById('anomalyResults');
        for (let i = 0; i < labels.length; i++) {
            const row = document.createElement('tr');
            const indexCell = document.createElement('td');
            const dateCell = document.createElement('td');
            const flowCell = document.createElement('td');
            const mseCell = document.createElement('td');
            const anomalyCell = document.createElement('td');

            indexCell.textContent = i + 1;
            dateCell.textContent = labels[i];
            flowCell.textContent = flowData[i];
            mseCell.textContent = mseValues[i];
            anomalyCell.textContent = anomalyResults[i];

            // Verificar se é uma anomalia e aplicar a classe correta
            if (anomalyResults[i] === 'Sim') {
                row.classList.add('anomaly');
            } else {
                row.classList.add('no-anomaly');
            }

            row.appendChild(indexCell);
            row.appendChild(dateCell);
            row.appendChild(flowCell);
            row.appendChild(mseCell);
            row.appendChild(anomalyCell);
            tableBody.appendChild(row);
        }

        // Criar o gráfico
        const ctx = document.getElementById('flowChart').getContext('2d');
        const flowChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [
                    {
                        label: 'Fluxo de Água (L/min)',
                        data: flowData,
                        borderColor: 'blue',
                        backgroundColor: 'rgba(0, 0, 255, 0.1)',
                        fill: true,
                        pointRadius: 0 // Esconde os pontos normais
                    },
                    {
                        label: 'Anomalias',
                        data: flowData.map((flow, index) => anomalyResults[index] === 'Sim' ? flow : null), // Mostra apenas os fluxos onde há anomalia
                        borderColor: 'red',
                        backgroundColor: 'rgba(255, 0, 0, 0.5)',
                        pointRadius: 5, // Destaca os pontos de anomalias
                        pointStyle: 'circle',
                        fill: false // Não preenche a área do gráfico
                    }
                ]
            },
            options: {
                responsive: true,
                scales: {
                    y: {
                        beginAtZero: true,
                        title: {
                            display: true,
                            text: 'Fluxo de Água (L/min)'
                        }
                    },
                    x: {
                        title: {
                            display: true,
                            text: 'Datas'
                        }
                    }
                }
            }
        });
    </script>
</body>
</html>
